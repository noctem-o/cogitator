name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Demo drift (minimal)
        run: cargo run --locked -- demo drift --seed 1 --threads 1 --fault-profile ci --out-dir demo_out --clean

      - name: Verify demo bundle
        run: cargo run --locked -- verify --witness demo_out/drift/baseline_faults

      - name: Recompute witness root from demo bundle
        run: cargo run --locked -- verify --witness demo_out/drift/baseline_faults --recompute-witness-root

      - name: Determinism smoke test
        run: |
          cargo run --locked -- run --seed 99 --runs 5 --out-dir smoke_a --clean --no-tui
          cargo run --locked -- run --seed 99 --runs 5 --out-dir smoke_b --clean --no-tui
          diff -u smoke_a/witness_root.txt smoke_b/witness_root.txt

      - name: Build without working git binary
        run: |
          mkdir -p fakebin
          cat > fakebin/git <<'SH'
          #!/usr/bin/env bash
          exit 127
          SH
          chmod +x fakebin/git
          PATH="$PWD/fakebin:$PATH" cargo build --locked

  ordeal-witness:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check ordeal witness root
        run: cargo run --locked -- ordeal check --golden goldens/ordeal_witness_root.txt

      - name: Upload ordeal witness artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ordeal-witness-artifacts
          path: |
            out_ci/run_0000
            goldens/ordeal_witness_root.txt


  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: RustSec advisory audit
        run: cargo audit
