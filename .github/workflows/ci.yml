name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Demo drift (minimal)
        run: cargo run -- demo drift --seed 1 --threads 1 --fault-profile ci --out-dir demo_out --clean

      - name: Verify demo bundle
        run: cargo run -- verify --witness demo_out/drift/baseline_faults

  gauntlet-witness:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Toolchain & env info
        run: |
          rustc -Vv
          cargo -V
          uname -a
          pwd
          git rev-parse HEAD
          git status --porcelain

      - name: Check gauntlet witness root
        run: bash ./scripts/check_gauntlet_root.sh

      - name: Upload gauntlet artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gauntlet-witness-artifacts
          path: |
            out_ci/run_0000
            goldens/gauntlet_witness_root.txt
