name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Demo drift (minimal)
        run: cargo run --locked -- demo drift --seed 1 --threads 1 --fault-profile ci --out-dir demo_out --clean

      - name: Verify demo bundle
        run: cargo run --locked -- verify --witness demo_out/drift/baseline_faults

  ordeal-witness:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check ordeal witness root
        run: cargo run --locked -- ordeal check --golden goldens/ordeal_witness_root.txt

      - name: Upload ordeal witness artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ordeal-witness-artifacts
          path: |
            out_ci/run_0000
            goldens/ordeal_witness_root.txt
