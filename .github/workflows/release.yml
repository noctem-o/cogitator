name: Release

env:
  CARGO_DIST_VERSION: 0.28.0

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  dist:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-dist
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 \
            "https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh" \
            -o /tmp/cargo-dist-installer.sh
          sh /tmp/cargo-dist-installer.sh --no-modify-path --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify cargo-dist version
        run: cargo dist --version | grep -F "cargo-dist ${CARGO_DIST_VERSION}"

      - name: Build release artifacts
        run: cargo dist build --artifacts=global

      - name: Publish GitHub release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo dist host --steps=upload

      - name: Attest release build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: dist/*
