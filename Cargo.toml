[package]
name = "cogitator"
version = "0.1.0"
edition = "2021"
description = "Deterministic parallel evaluation harness with optional TUI inspection cockpit"
license = "MIT"

[features]
tui = ["dep:ratatui", "dep:crossterm"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
tokio = { version = "1.40", features = ["full"] }
reqwest = { version = "0.13", features = ["json"] }
serde_json = "1.0"
anyhow = "1.0"
ollama-rs = "0.2.1"
csv = "1.3"
sha2 = "0.10"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
csv = "1"
rand = "0.8"
chrono = "0.4"
nix = "0.29"
sha2 = "0.10"
rayon = "1"

ratatui = { version = "0.28", optional = true }
crossterm = { version = "0.28", optional = true, features = ["event-stream"] }
